<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <rect width="500" height="400" fill="#f7f4ef"/>
  <!-- Zoomed page corner -->
  <rect x="40" y="30" width="420" height="320" rx="2" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <!-- Illustration area -->
  <rect x="60" y="50" width="180" height="150" fill="none" stroke="#bbb" stroke-dasharray="5 3"/>
  <text x="150" y="130" text-anchor="middle" font-size="12" fill="#bbb">illustration detail</text>
  <!-- Text beside illustration -->
  <text x="270" y="75" font-size="11" fill="#ccc">...nesene legkym větrom.</text>
  <text x="270" y="95" font-size="11" fill="#ccc">Ptice, ktore sut ješče ne</text>
  <text x="270" y="115" font-size="11" fill="#ccc">poletěli do Raja, pěvali</text>
  <text x="270" y="135" font-size="11" fill="#ccc">krasno posrěd žolto-</text>
  <text x="270" y="155" font-size="11" fill="#ccc">oranževyh drěv.</text>
  <!-- Page number -->
  <text x="430" y="330" text-anchor="end" font-size="10" fill="#ddd">177</text>
  <!-- Magnifier hint -->
  <circle cx="150" cy="240" r="60" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="192" y1="282" x2="230" y2="320" stroke="#aaa" stroke-width="2"/>
  <text x="250" y="315" font-size="10" fill="#aaa">close-up of illustration style</text>
  <!-- Photo guide -->
  <text x="250" y="385" text-anchor="middle" font-size="10" fill="#c44" font-style="italic">PHOTO: macro close-up of a page — show illustration quality + text typography</text>
</svg>
