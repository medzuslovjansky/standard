<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f7f4ef"/>
  <polygon points="50,50 295,30 295,340 50,350" fill="#fff" stroke="#ccc" stroke-width="1.5"/>
  <polygon points="305,30 550,50 550,350 305,340" fill="#fff" stroke="#ccc" stroke-width="1.5"/>
  <line x1="300" y1="25" x2="300" y2="345" stroke="#ddd" stroke-width="2"/>
  <!-- Left page: illustration -->
  <rect x="80" y="70" width="180" height="120" fill="none" stroke="#bbb" stroke-dasharray="5 3"/>
  <text x="170" y="135" text-anchor="middle" font-size="11" fill="#bbb">illustration</text>
  <!-- Right page: Cyrillic text -->
  <text x="427" y="65" text-anchor="middle" font-size="12" fill="#999" font-style="italic">XIV. Ливады</text>
  <text x="340" y="90" font-size="10" fill="#ccc">Људи говорет, же в тамтој денј</text>
  <text x="340" y="106" font-size="10" fill="#ccc">было велико спокојно. Чисто небо</text>
  <text x="340" y="122" font-size="10" fill="#ccc">было јасно, а облакы шли помало,</text>
  <text x="340" y="138" font-size="10" fill="#ccc">несене легкым вєтром. Птице,</text>
  <text x="340" y="154" font-size="10" fill="#ccc">кторе сут јешче не полетєли до</text>
  <text x="340" y="170" font-size="10" fill="#ccc">Раја, пєвали красно посрєд</text>
  <text x="340" y="186" font-size="10" fill="#ccc">жолто-оранжевых дрєв.</text>
  <!-- Photo guide -->
  <text x="300" y="385" text-anchor="middle" font-size="10" fill="#c44" font-style="italic">PHOTO: Cyrillic edition open, top-down, show text + illustration spread</text>
</svg>
